services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped